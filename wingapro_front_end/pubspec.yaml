name: wingapro
description: "Winga Pro, the ultimate bundle seller in Tanzania"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.5.5
  image_picker: ^1.0.5
  provider: ^6.1.1
  app_links: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/wingaproicon.png"